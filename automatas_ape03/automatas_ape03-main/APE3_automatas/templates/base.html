<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Autómatas Finitos{% endblock %} — APE 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#07090f; --surface:#0d1018; --surface2:#131720; --surface3:#1c2130;
      --afd-accent:#00d4aa; --afd-glow:rgba(0,212,170,0.18);
      --afnd-accent:#a855f7; --afnd-glow:rgba(168,85,247,0.18);
      --danger:#ff4757; --warn:#ffa502;
      --text:#dde3f0; --muted:#5a6480; --border:#1e2535;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
    a{text-decoration:none;color:inherit}
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
